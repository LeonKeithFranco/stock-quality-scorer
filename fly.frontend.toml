# fly.toml app configuration file generated for stock-quality-scorer-frontend on 2026-05-15T10:03:54-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stock-quality-scorer-frontend'
primary_region = 'yyz'

[build]
  dockerfile = "frontend/Dockerfile"

[env]
  APP_NAME="Stock Quality Scorer Dashboard"
  APP_DEBUG=false
  API_BASE_URL="https://stock-quality-scorer-backend.fly.dev"
  API_TIMEOUT=60.0

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/_stcore/health"
