# fly.toml app configuration file generated for stock-quality-scorer on 2026-05-15T09:17:51-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stock-quality-scorer-backend'
primary_region = 'yyz'

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_NAME="Stock Quality Scorer"
  APP_DEBUG=false

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
